# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires a .env file — see .env.example

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mami_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d mami_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./config:/config
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/mami_db
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: '["https://${DOMAIN}","http://${DOMAIN}"]'
    restart: unless-stopped
    # No ports — nginx handles all public traffic

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    # No ports — nginx handles all public traffic

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certificates (mounted after certbot runs)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot webroot challenge directory
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
