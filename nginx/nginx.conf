# MAMI Checker — nginx reverse proxy
#
# Phase 1 (HTTP only): serves on port 80
# Phase 2 (HTTPS):     see comments at the bottom — swap in the ssl server block
#                      after running certbot and update DOMAIN below.

server {
    listen 80;
    server_name _;

    # Let's Encrypt HTTP-01 challenge (used by certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- API: FastAPI backend ---
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # FastAPI auto-docs (Swagger UI)
    location /docs {
        proxy_pass         http://backend:8000/docs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /redoc {
        proxy_pass         http://backend:8000/redoc;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /openapi.json {
        proxy_pass         http://backend:8000/openapi.json;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_set_header   Host              $host;
    }

    # --- Frontend: React SPA served by nginx inside the frontend container ---
    location / {
        proxy_pass         http://frontend:80/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

