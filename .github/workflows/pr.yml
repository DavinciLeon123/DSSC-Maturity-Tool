name: PR Checks

on:
  pull_request:
    branches: [main, staging]

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      - run: uv run mypy app --ignore-missing-imports

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - name: pip-audit (backend, 3 attempts)
        working-directory: backend
        run: |
          uv sync --locked
          uv export --no-dev --no-emit-project --format requirements-txt -o /tmp/requirements.txt
          for i in 1 2 3; do
            uv run pip-audit -r /tmp/requirements.txt --progress-spinner=off && exit 0
            echo "pip-audit attempt $i failed"
            [ "$i" != "3" ] && sleep 10
          done
          echo "pip-audit failed after 3 attempts"
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run --coverage

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      # WeasyPrint (used by tests/api/test_reports.py's PDF-generation path) needs native
      # Pango/GLib libraries beyond the Python package — without these, importing weasyprint
      # raises OSError: cannot load library 'libgobject-2.0-0'.
      - name: Install WeasyPrint system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf2.0-0 libcairo2
      - run: uv sync --locked
      # perf and benchmark tests run in their own dedicated jobs, kept out of the
      # PR test job so PR feedback stays fast (see pyproject.toml markers).
      - run: uv run pytest tests/ -n auto -m "not perf and not benchmark" -q

  perf-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      # No -n auto here: pytest-benchmark's timing needs a single worker, not parallel xdist workers.
      - run: uv run pytest tests/ -m perf -q

  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
        working-directory: backend
      - run: uv run python scripts/export_openapi.py
        working-directory: backend
      - name: Fail if the OpenAPI schema doc is out of date
        run: git diff --exit-code -- docs/api/openapi.json
