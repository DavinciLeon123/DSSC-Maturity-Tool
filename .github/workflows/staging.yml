name: Staging CI/CD

on:
  push:
    branches: [staging]

concurrency:
  group: staging-${{ github.workflow }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      - run: uv run mypy app --ignore-missing-imports

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - name: pip-audit (backend, 3 attempts)
        working-directory: backend
        run: |
          uv sync --locked
          uv export --no-dev --no-emit-project --format requirements-txt -o /tmp/requirements.txt
          for i in 1 2 3; do
            uv run pip-audit -r /tmp/requirements.txt --progress-spinner=off && exit 0
            echo "pip-audit attempt $i failed"
            [ "$i" != "3" ] && sleep 10
          done
          echo "pip-audit failed after 3 attempts"
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
        working-directory: backend
      - run: uv run python scripts/export_openapi.py
        working-directory: backend
      - name: Fail if the OpenAPI schema doc is out of date
        run: git diff --exit-code -- docs/api/openapi.json

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      # Full suite including the benchmark-marked regression tests (excluded on PRs to
      # keep PR feedback fast, but required before code reaches staging).
      - run: uv run pytest tests/ -n auto -m "not perf" -q

  perf-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      - run: uv run pytest tests/ -m perf -q

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-typecheck, frontend-lint, frontend-typecheck, test]
    permissions:
      contents: read
      packages: write
    outputs:
      backend-image: ${{ steps.tags.outputs.backend }}
      frontend-image: ${{ steps.tags.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: tags
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=${{ env.REGISTRY }}/${owner}/${repo}-backend:staging" >> "$GITHUB_OUTPUT"
          echo "frontend=${{ env.REGISTRY }}/${owner}/${repo}-frontend:staging" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.backend }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.frontend }}

  sbom:
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: mkdir -p docs/security
      - name: Generate backend SBOMs
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.docker-build.outputs.backend-image }}
          format: cyclonedx-json
          output-file: docs/security/sbom-backend-cyclonedx.json
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.docker-build.outputs.backend-image }}
          format: spdx-json
          output-file: docs/security/sbom-backend-spdx.json
      - name: Generate frontend SBOMs
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.docker-build.outputs.frontend-image }}
          format: cyclonedx-json
          output-file: docs/security/sbom-frontend-cyclonedx.json
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.docker-build.outputs.frontend-image }}
          format: spdx-json
          output-file: docs/security/sbom-frontend-spdx.json
      - name: Commit SBOMs
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/security/
          git diff --cached --quiet && { echo "pushed=unchanged" >> "$GITHUB_OUTPUT"; exit 0; }
          git commit -m "chore(sbom): update SBOMs for staging build ${{ github.sha }} [skip ci]"
          # `staging` is a protected branch — GITHUB_TOKEN can't push to it directly unless a
          # bypass is configured (see CLAUDE.md's setup checklist). Fall back to an artifact
          # instead of hard-failing the job when that push is rejected.
          if git push origin HEAD:staging; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload SBOMs as an artifact (push to staging was rejected)
        if: steps.commit.outputs.pushed == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sboms-staging-${{ github.sha }}
          path: docs/security/sbom-*.json
