name: Main CI

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.workflow }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      - run: uv run mypy app --ignore-missing-imports

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - name: pip-audit (backend, 3 attempts)
        working-directory: backend
        run: |
          uv sync --locked
          uv export --no-dev --no-emit-project --format requirements-txt -o /tmp/requirements.txt
          for i in 1 2 3; do
            uv run pip-audit -r /tmp/requirements.txt --progress-spinner=off && exit 0
            echo "pip-audit attempt $i failed"
            [ "$i" != "3" ] && sleep 10
          done
          echo "pip-audit failed after 3 attempts"
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
        working-directory: backend
      - run: uv run python scripts/export_openapi.py
        working-directory: backend
      - name: Fail if the OpenAPI schema doc is out of date
        run: git diff --exit-code -- docs/api/openapi.json

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      # Full suite including the benchmark-marked regression tests.
      - run: uv run pytest tests/ -n auto -m "not perf" -q

  perf-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv sync --locked
      - run: uv run pytest tests/ -m perf -q

  docker-build-and-sbom:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-typecheck, frontend-lint, frontend-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: mami-checker-backend:main-${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: mami-checker-frontend:main-${{ github.sha }}
      - name: Generate backend SBOMs
        uses: anchore/sbom-action@v0
        with:
          image: mami-checker-backend:main-${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-backend-cyclonedx.json
      - uses: anchore/sbom-action@v0
        with:
          image: mami-checker-backend:main-${{ github.sha }}
          format: spdx-json
          output-file: sbom-backend-spdx.json
      - name: Generate frontend SBOMs
        uses: anchore/sbom-action@v0
        with:
          image: mami-checker-frontend:main-${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-frontend-cyclonedx.json
      - uses: anchore/sbom-action@v0
        with:
          image: mami-checker-frontend:main-${{ github.sha }}
          format: spdx-json
          output-file: sbom-frontend-spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sboms-main-${{ github.sha }}
          path: sbom-*.json
          retention-days: 90
